<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SysPanel — تسجيل الدخول</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
      </div>
      <div class="login-logo-text">SysPanel</div>
      <div class="login-logo-sub">لوحة تحكم الخادم — v2.0</div>
    </div>
    {% if error %}
    <div class="login-error">⚠ {{ error }}</div>
    {% endif %}
    <form method="POST">
      <div class="form-field">
        <label>اسم المستخدم</label>
        <input type="text" name="username" placeholder="أدخل اسم المستخدم" required autofocus>
      </div>
      <div class="form-field">
        <label>كلمة المرور</label>
        <input type="password" name="password" placeholder="أدخل كلمة المرور" required>
      </div>
      <button type="submit" class="login-btn">دخول إلى النظام</button>
    </form>
    <div class="login-hint">الدخول الافتراضي: <strong>munif</strong> / <strong>admin123</strong></div>
  </div>
</div>
</body>
</html>
